global:
  search_limit: 5
  player:
    command: ffplay
    args:
      - -nodisp
      - -autoexit
      - -loglevel
      - warning
      - -af
      - volume=0.4
      - "{url}"
    env:
      # Point the container to the host PulseAudio TCP socket
      PULSE_SERVER: "tcp:localhost:4713"
      # Force SDL to use PulseAudio driver
      SDL_AUDIODRIVER: "pulse"
    timeout: 20m
  # Use a local MPD server instead of a player command.
  # If enabled: it ignores 'player' section.
  mpd:
    enabled: true
    network: tcp
    address: localhost:6600
    password: "" # Optional: provide a password if MPD requires authentication
    music_root: "/media/music" # Optional: parent directory of download_dir so MPD can resolve local files
  ytdlp:
    binary: yt-dlp
    # Optional: override user agent (e.g., Safari) if needed.
    user_agent: ""
    # Provide PO token or provider to solve GVS challenges; optional.
    po_token: ""
    po_token_provider: ""
    po_token_provider_args: []
    # Point to an exported cookies file to use YouTube Premium (avoid ads).
    # Mount it into the container (see docker-compose.yaml) and reference the container path here.
    cookies: /app/cookies.txt
    # Optional: download audio to a local directory before playing.
    # This helps avoid HTTP 403 Forbidden errors when MPD tries to decode streams directly.
    # Cron jobs use this directory; the web UI has its own download_dir below.
    download_dir: /app/downloads
    extra_args: []
  # Optional: on-demand web UI for downloading videos/playlists.
  web_ui:
    enabled: false
    listen: ":8080"
    username: ""          # Basic auth username; leave empty to disable authentication
    password: ""          # Basic auth password
    download_dir: "/media/music/youtube" # target directory for web UI downloads
    subdir: ""            # optional global subdir under download_dir
    max_concurrent: 2
    timeout: "2h"
    history_path: ""      # empty = history.jsonl next to config.yaml

jobs:
  - name: morning-feed
    cron: "0 8 * * *"
    keywords:
      - my keyword
      - daily playlist
    # Use Go time layout; defaults to 2006-01-02 when omitted.
    date_format: "2006-01-02"
    # Optional override; falls back to global.search_limit when omitted.
    search_limit: 5
