global:
  search_limit: 5
  player:
    command: ffplay
    args:
      - -nodisp
      - -autoexit
      - -loglevel
      - warning
      - -af
      - volume=0.4
      - "{url}"
    env:
      # Point the container to the host PulseAudio TCP socket
      PULSE_SERVER: "tcp:localhost:4713"
      # Force SDL to use PulseAudio driver
      SDL_AUDIODRIVER: "pulse"
    timeout: 20m
  ytdlp:
    binary: yt-dlp
    # Optional: override user agent (e.g., Safari) if needed.
    user_agent: ""
    # Provide PO token or provider to solve GVS challenges; optional.
    po_token: ""
    po_token_provider: ""
    po_token_provider_args: []
    # Point to an exported cookies file to use YouTube Premium (avoid ads).
    # Mount it into the container (see docker-compose.yaml) and reference the container path here.
    cookies: /app/cookies.txt
    extra_args: []

jobs:
  - name: morning-feed
    cron: "0 8 * * *"
    keywords:
      - my keyword
      - daily playlist
    # Use Go time layout; defaults to 2006-01-02 when omitted.
    date_format: "2006-01-02"
    # Optional override; falls back to global.search_limit when omitted.
    search_limit: 5
