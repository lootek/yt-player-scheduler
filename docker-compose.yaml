version: "3.9"

services:
  yt-rpi-player:
    build: .
    image: yt-rpi-player:local
    container_name: yt-rpi-player
    network_mode: host
    restart: unless-stopped
    environment:
      PULSE_SERVER: tcp:localhost:4713
      TZ: Europe/Warsaw
    volumes:
      # Main config file for jobs and player settings.
      - ./config.yaml:/app/config.yaml:ro
      # PulseAudio socket from the host; requires XDG_RUNTIME_DIR to be set when running docker compose.
      - /run/user/1000/pulse/native:/tmp/pulse-socket
      # Optional: mount yt-dlp cookies if needed for authenticated feeds.
      - ./cookies.txt:/app/cookies.txt:ro
      # Optional: mount a directory for downloaded audio files.
      - /media/music/youtube/yt-rpi-player-cache/brewiarz:/app/cache
    # Uncomment if your setup requires direct ALSA device access (usually not needed with PulseAudio).
    # devices:
    #   - /dev/snd
